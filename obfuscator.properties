# Obfuscator v1.0.0 by Superblaubeere27
# https://github.com/superblaubeere27/obfuscator

# 输入和输出文件路径
# {version} 和 {name} 将由 build.gradle 动态替换
input: build/libs/{name}-{version}.jar
output: build/libs/{name}-{version}-obf.jar

# 依赖库
# {allLibrariesPath} 将由 build.gradle 动态替换为所有依赖的完整路径
libraries:
- {allLibrariesPath}

# 启用/禁用混淆器
enabled: true

# 混淆器设置
processors:
  # 字符串加密
  StringEncryption:
    enabled: true
    # 模式: 'XOR' (简单快速), 'AES' (更安全)
    mode: AES
  
  # 控制流混淆
  FlowObfuscation:
    enabled: true
    # 强度 (0-100)
    intensity: 80
    # 尝试混淆所有方法
    tryall: true
  
  # 数字加密
  NumberObfuscation:
    enabled: true
    # 模式: 'XOR' (简单), 'SHIFT' (移位)
    mode: XOR
  
  # 引用混淆 (隐藏方法调用)
  ReferenceObfuscation:
    enabled: true
    # 排除主类和 FML 事件处理方法
    exclude:
    - com.zszl.zszlScriptMod.zszlScriptMod
    - com.zszl.zszlScriptMod.**.*EventHandler
    - com.zszl.zszlScriptMod.**.*EventListener
    - com.zszl.zszlScriptMod.**.*Gui*
  
  # 移除调试信息 (行号等)
  LineNumberObfuscation:
    enabled: true
    
  # 重命名 (类、方法、字段)
  Renamer:
    enabled: true
    # 模式: 'RANDOM' (随机字符), 'ALPHABETICAL' (a, b, c...)
    mode: ALPHABETICAL
    # 排除主类和 FML 事件处理方法
    exclude:
    - com.zszl.zszlScriptMod.zszlScriptMod
    - com.zszl.zszlScriptMod.**.*EventHandler
    - com.zszl.zszlScriptMod.**.*EventListener
    - com.zszl.zszlScriptMod.**.*Gui*
